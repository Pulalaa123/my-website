    <script>
        let texts = [

            "អរគុណដែលបានអាន!",
        ];

        let index = 0;

        function changeText() {
            const box = document.querySelector('box');

            box.style.opacity = 0;  // hide 

            setTimeout(() => {
                box.textContent = texts[index];
                box.style.opacity = 1;  // show

                index++;
                if (index >= texts.length) {
                    index = 0; // the number wait before changing to the next text
                }// if use index = 0 need to click to show next index
            }, 500); // this number is wait for how long the text will change in millisecond 1000ms = 1s
        }
